# Render Blueprint — SmartBrick Forecasting Service (Phase 10D)
# Deploy as a separate web service alongside the Node backend.
# Dashboard: New → Blueprint → connect repo → select this file.
services:
  - type: web
    name: smartbrick-forecasting
    runtime: python
    rootDir: forecasting-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
