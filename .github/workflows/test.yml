name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: ${{ matrix.package }} tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - client
          - server

    defaults:
      run:
        working-directory: ${{ matrix.package }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  client-build:
    name: client build
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: client

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build client
        run: npm run build
