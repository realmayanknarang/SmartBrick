<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartBrick — Procurement Intelligence for Builders</title>

    <!-- SEO — Phase 6B -->
    <meta
      name="description"
      content="SmartBrick gives construction teams real-time demand forecasting, vendor scoring, and supply-risk alerts — so nothing stalls your build."
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="SmartBrick — Procurement Intelligence for Builders" />
    <meta property="og:description" content="End-to-end procurement intelligence for every site you run. Demand forecasting, vendor scoring, and risk alerts in one platform." />
    <meta property="og:url"         content="https://smartbrick.app/" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="SmartBrick — Procurement Intelligence for Builders" />
    <meta name="twitter:description" content="End-to-end procurement intelligence for every site you run." />

    <!-- Google Fonts: preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Barlow Condensed (--font-display): geometric condensed sans for headlines.
      Inter (--font-body): clean grotesque sans for body copy and UI text.
      Weights loaded: 400 (regular), 500 (medium), 600 (semibold), 700 (bold).
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,600;0,700;1,600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
